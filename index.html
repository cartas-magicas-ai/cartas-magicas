    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap');
        
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 100%);
            min-height: 100vh;
        }

        .title-font { font-family: 'Dancing Script', cursive; }

        .ad-container {
            background: rgba(255, 255, 255, 0.4);
            border: 1px dashed #d1d5db;
            margin: 15px auto;
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            min-height: 120px; 
            max-width: 728px;
            color: #9ca3af; 
            border-radius: 12px; 
            font-size: 10px;
            overflow: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .floating-creator {
            position: fixed;
            bottom: 8px;
            right: 12px;
            font-size: 9px;
            color: #b0b0b0;
            opacity: 0.6;
            z-index: 100;
            letter-spacing: 0.5px;
            pointer-events: none;
        }

        .envelope-anim { animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- PUBLICIDAD SUPERIOR -->
    <div id="ad-top" class="ad-container">
        <script async="async" data-cfasync="false" src="https://pl29224954.profitablecpmratenetwork.com/76e9d4959018159da0937efac1273249/invoke.js"></script>
        <div id="container-76e9d4959018159da0937efac1273249"></div>
    </div>

    <div class="max-w-2xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-6xl title-font text-pink-600 mb-2">Cartas Mágicas</h1>
            <p class="text-gray-600 font-medium">Crea momentos inolvidables con música.</p>
        </header>

        <section class="mb-10">
            <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                <i class="fas fa-star text-yellow-500 mr-2 text-sm"></i> Mi Carta Especial
            </h2>
            <div class="glass rounded-3xl p-6 shadow-2xl border-2 border-pink-200 relative overflow-hidden">
                <div class="flex flex-col md:flex-row items-center gap-6">
                    <div class="w-20 h-20 bg-pink-100 rounded-3xl flex items-center justify-center text-pink-400 text-3xl envelope-anim">
                        <i class="fas fa-envelope-open-heart"></i>
                    </div>
                    <div class="flex-1 text-center md:text-left">
                        <h3 class="text-2xl font-bold text-gray-800">Para ti Madre</h3>
                        <p class="text-pink-500 font-semibold italic text-sm">🎵 Amor Sincero - Jenaro Vargas</p>
                    </div>
                    <div class="flex flex-col gap-2 w-full md:w-auto">
                        <button onclick="verCartaMadres()" class="bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 px-8 rounded-2xl transition-all shadow-md text-sm">
                            VER
                        </button>
                        <button onclick="compartirUniversal('Para ti Madre', 'madres.html')" class="bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-3 px-8 rounded-2xl transition-all shadow-md text-sm">
                            COMPARTIR
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- PUBLICIDAD INTERMEDIA -->
        <div id="ad-middle" class="ad-container">
            <script async="async" data-cfasync="false" src="https://pl29224954.profitablecpmratenetwork.com/76e9d4959018159da0937efac1273249/invoke.js"></script>
            <div id="container-76e9d4959018159da0937efac1273249"></div>
        </div>

        <section class="mb-10">
            <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                <i class="fas fa-magic text-purple-500 mr-2 text-sm"></i> Crear Nueva Carta
            </h2>
            <div class="glass rounded-3xl p-8 shadow-xl">
                <div class="space-y-4 text-left">
                    <div>
                        <label class="text-xs font-bold text-gray-500 ml-2">PARA:</label>
                        <input type="text" id="nombre" placeholder="Nombre" class="w-full p-4 rounded-2xl border-2 border-gray-100 focus:border-pink-300 outline-none">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-500 ml-2">MENSAJE:</label>
                        <textarea id="mensaje" rows="3" placeholder="Tu mensaje..." class="w-full p-4 rounded-2xl border-2 border-gray-100 focus:border-pink-300 outline-none"></textarea>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-500 ml-2">LINK AUDIO (DROPBOX):</label>
                        <input type="text" id="audio" placeholder="Link ?dl=1" class="w-full p-4 rounded-2xl border-2 border-gray-100 focus:border-pink-300 outline-none">
                    </div>
                    <button onclick="generarCartaNueva()" class="w-full bg-gradient-to-r from-pink-500 to-purple-600 text-white font-bold py-4 rounded-2xl shadow-lg transition-transform hover:scale-[1.02]">
                        GENERAR LINK
                    </button>
                </div>
            </div>
        </section>

        <div id="resultado" class="hidden glass rounded-3xl p-8 mb-10 border-2 border-green-400 text-center">
            <input type="text" id="linkGenerado" readonly class="w-full p-3 bg-white border rounded-xl mb-4 text-center text-blue-500 text-xs">
            <button onclick="compartirLinkGenerado()" class="w-full bg-green-500 text-white font-bold py-4 rounded-2xl shadow-lg">
                <i class="fas fa-share-nodes mr-2"></i> COMPARTIR
            </button>
        </div>

    <!-- PUBLICIDAD INFERIOR -->
    <div id="ad-bottom" class="ad-container">
        <script async="async" data-cfasync="false" src="https://pl29224954.profitablecpmratenetwork.com/76e9d4959018159da0937efac1273249/invoke.js"></script>
        <div id="container-76e9d4959018159da0937efac1273249"></div>
    </div>

    <div class="floating-creator">fabian merchan</div>

    <script>
        function verCartaMadres() { window.location.href = 'madres.html'; }

        async function compartirUniversal(titulo, path) {
            const url = window.location.origin + window.location.pathname.replace('index.html', '') + path;
            if (navigator.share) {
                await navigator.share({ title: titulo, text: 'Te enviaron una carta especial. Ábrela aquí: 🌹', url: url });
            } else { window.open(`https://api.whatsapp.com/send?text=Mira esta carta: ${url}`, '_blank'); }
        }

        function generarCartaNueva() {
            const n = document.getElementById('nombre').value;
            const m = document.getElementById('mensaje').value;
            const a = document.getElementById('audio').value;
            if(!n || !m || !a) { alert("Completa los campos"); return; }
            const datos = btoa(unescape(encodeURIComponent(JSON.stringify({ n, m, a }))));
            const urlFinal = window.location.origin + window.location.pathname + "?carta=" + datos;
            document.getElementById('linkGenerado').value = urlFinal;
            document.getElementById('resultado').classList.remove('hidden');
        }

        async function compartirLinkGenerado() {
            const url = document.getElementById('linkGenerado').value;
            if (navigator.share) {
                await navigator.share({ title: 'Carta Mágica', text: 'Te envié una sorpresa: 💌', url: url });
            } else { window.open(`https://api.whatsapp.com/send?text=Te envié una carta: ${url}`, '_blank'); }
        }

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const cartaData = urlParams.get('carta');
            if (cartaData) {
                try {
                    const d = JSON.parse(decodeURIComponent(escape(atob(cartaData))));
                    document.body.innerHTML = `
                        <div class="flex flex-col items-center justify-center min-h-screen p-6 text-center bg-pink-50">
                            <!-- ANUNCIO DENTRO DE LA CARTA -->
                            <div class="ad-container mb-4">
                                <script async="async" data-cfasync="false" src="https://pl29224954.profitablecpmratenetwork.com/76e9d4959018159da0937efac1273249/invoke.js"><\/script>
                                <div id="container-76e9d4959018159da0937efac1273249"></div>
                            </div>
                            
                            <div class="max-w-md w-full bg-white p-10 rounded-[40px] shadow-2xl border border-pink-100">
                                <div class="text-6xl mb-6 text-pink-400 envelope-anim"><i class="fas fa-envelope-open-text"></i></div>
                                <h1 class="text-4xl title-font text-pink-600 mb-6">${d.n}</h1>
                                <div class="my-8 text-gray-700 italic text-xl">"${d.m}"</div>
                                <div class="bg-pink-50 p-6 rounded-3xl mb-8">
                                    <audio controls class="w-full" autoplay><source src="${d.a}" type="audio/mpeg"></audio>
                                </div>
                                <button onclick="location.href='index.html'" class="text-gray-400 text-[10px] underline">CREAR CARTA</button>
                            </div>
                            <div class="floating-creator">fabian merchan</div>
                        </div>
                    `;
                } catch (e) { console.error("Error al cargar la carta:", e); }
            }
        };
    </script>
</body>
</html>
